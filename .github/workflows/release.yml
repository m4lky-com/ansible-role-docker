name: Release Role

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          pip install ansible ansible-lint

      - name: Lint Role
        run: |
          ansible-lint .

      - name: Validate Version Tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}

          ROLE_VERSION=$(python - <<EOF
import yaml
print(yaml.safe_load(open("meta/main.yml"))["galaxy_info"]["version"])
EOF
)

          if [ "$VERSION" != "$ROLE_VERSION" ]; then
            echo "Tag version must match role metadata version"
            exit 1
          fi

      - name: Publish Role
        env:
          GALAXY_API_TOKEN: ${{ secrets.GALAXY_API_TOKEN }}
        run: |
          echo "$GALAXY_API_TOKEN" > ~/.ansible/galaxy_token
          chmod 600 ~/.ansible/galaxy_token

          ansible-galaxy role import \
            m4lky \
            ansible-role-docker
