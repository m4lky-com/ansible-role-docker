---
docker_repo_url: "https://download.docker.com/linux/ubuntu"
docker_gpg_url: "{{ docker_repo_url }}/gpg"
docker_keyring_path: "/etc/apt/keyrings"
docker_keyring_file: "{{ docker_keyring_path }}/docker.asc"
docker_sources_file: "/etc/apt/sources.list.d/docker.sources"

docker_prereq_packages:
  - ca-certificates
  - curl

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_package_state: present
docker_service_state: started
docker_service_enabled: true

docker_volume_directories:
  - /home/malcolm/docker-volumes/jenkins
  - /home/malcolm/docker-volumes/transmission/config 
  - /home/malcolm/docker-volumes/transmission/watch
  - /home/malcolm/docker-volumes/nginx/rproxy
  - /home/malcolm/docker-volumes/portainer
  - /home/malcolm/docker-volumes/unifi-mongodb/data
  - /home/malcolm/docker-volumes/unifi-mongodb/init
  - /home/malcolm/docker-volumes/unifi-network-appliance